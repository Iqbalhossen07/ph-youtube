<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>PH-Tube</title>

</head>
<body class="w-11/12 mx-auto">
    
    <header>
        <nav class="flex justify-between py-5 border-b-2 border-[#17171720]">
            <div><img src="assets/Logo.png" alt=""></div>
            <div><button class="btn">Sort by view</button></div>
            <div><button class="btn bg-[#FF1F3D] py-2 px-2 rounded-md font-semibold text-white">Blogs</button></div>
        </nav>
    </header>
    <nav id="category-container" class="py-5 flex justify-center gap-2">
        
           <div>
             <button class="btn btn-sm bg-[#FF1F3D] hover:bg-[black] text-white">All</button>
           </div>
        

    </nav>

    <section id="video-container">

        <div class="card bg-base-100 w-96 shadow-sm">
            <figure>
                <img
                src="https://img.daisyui.com/images/stock/photo-1606107557195-0e29a4b5b4aa.webp"
                alt="Shoes" />
            </figure>
            <div class="card-body">
                <h2 class="card-title">Card Title</h2>
                <p>A card component has a figure, a body part, and inside body there are title and actions parts</p>
                <div class="card-actions justify-end">
                <button class="btn btn-primary">Buy Now</button>
                </div>
            </div>
        </div>

    </section>

    <script src="script/index.js"></script>
</body>
</html>
