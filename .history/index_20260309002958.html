<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>PH-Tube</title>
    <style>
        .active{
            background: #FF1F3D;
            color: white;
        }
    </style>

</head>
<body class="w-11/12 mx-auto">
    
    <header>
        <nav class="flex justify-between py-5 border-b-2 border-[#17171720]">
            <div><img src="assets/Logo.png" alt=""></div>
            <div><label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input type="search" required placeholder="Search" />
</label></div>
            <div><button class="btn bg-[#FF1F3D] py-2 px-2 rounded-md font-semibold text-white">Blogs</button></div>
        </nav>
    </header>
    <nav id="category-container" class="py-5 flex justify-center gap-2">
        
           <div>
             <button id="all-btn" onclick="loadVideos()" class="btn btn-sm ">All</button>
           </div>
        

    </nav>

    <section class="py-12">
        <div id="video-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">

           

        </div>
    </section>

    <!-- You can open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_3.showModal()">open modal</button> -->
<dialog id="show_modal" class="modal">
  <div class="modal-box">
    <form method="dialog">
      <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
    </form>
    <div id="modal_div">

    </div>
  </div>
</dialog>

    <script src="script/index.js"></script>
</body>
</html>
